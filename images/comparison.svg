<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0000"/>
      <stop offset="100%" style="stop-color:#8B0000"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4500"/>
      <stop offset="100%" style="stop-color:#CC3700"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#666666"/>
      <stop offset="100%" style="stop-color:#444444"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#555555"/>
      <stop offset="100%" style="stop-color:#333333"/>
    </linearGradient>
    <linearGradient id="bar5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#888888"/>
      <stop offset="100%" style="stop-color:#666666"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#FF0000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)"/>
  
  <!-- Grid Lines -->
  <g stroke="#333" stroke-width="0.5" stroke-dasharray="5,5">
    <line x1="100" y1="400" x2="850" y2="400"/>
    <line x1="100" y1="340" x2="850" y2="340"/>
    <line x1="100" y1="280" x2="850" y2="280"/>
    <line x1="100" y1="220" x2="850" y2="220"/>
    <line x1="100" y1="160" x2="850" y2="160"/>
    <line x1="100" y1="100" x2="850" y2="100"/>
  </g>
  
  <!-- Y-Axis Labels -->
  <g fill="#888" font-family="Arial" font-size="12">
    <text x="85" y="404" text-anchor="end">0</text>
    <text x="85" y="344" text-anchor="end">10</text>
    <text x="85" y="284" text-anchor="end">20</text>
    <text x="85" y="224" text-anchor="end">30</text>
    <text x="85" y="164" text-anchor="end">40</text>
    <text x="85" y="104" text-anchor="end">50</text>
  </g>
  
  <!-- 3D Base Platform -->
  <polygon points="80,400 870,400 850,420 100,420" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <polygon points="870,400 850,420 850,425 870,405" fill="#0d0d1a" stroke="#333" stroke-width="0.5"/>
  
  <!-- Bars with 3D Effect -->
  
  <!-- WEB-KILLER Bar (57 methods) - TALLEST -->
  <g filter="url(#shadow)">
    <!-- Front face -->
    <rect x="140" y="64" width="100" height="336" fill="url(#bar1)" rx="4"/>
    <!-- Top face (3D) -->
    <polygon points="140,64 240,64 230,54 130,54" fill="#FF1A1A"/>
    <!-- Right face (3D) -->
    <polygon points="240,64 240,400 230,390 230,54" fill="#660000"/>
    <!-- Value Label -->
    <text x="190" y="48" fill="#FF0000" font-family="Arial Black" font-size="24" font-weight="bold" text-anchor="middle" filter="url(#glow)">57</text>
    <text x="190" y="430" fill="#FF0000" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">WEB-KILLER</text>
    <text x="190" y="448" fill="#FF4444" font-family="Arial" font-size="10" text-anchor="middle">🏆 #1</text>
  </g>
  
  <!-- MHDDoS Bar (26 methods) -->
  <g filter="url(#shadow)">
    <rect x="290" y="256" width="100" height="144" fill="url(#bar2)" rx="4"/>
    <polygon points="290,256 390,256 380,246 280,246" fill="#FF5C33"/>
    <polygon points="390,256 390,400 380,390 380,246" fill="#B32D00"/>
    <text x="340" y="240" fill="#FF4500" font-family="Arial Black" font-size="22" font-weight="bold" text-anchor="middle">26</text>
    <text x="340" y="430" fill="#FF4500" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">MHDDoS</text>
    <text x="340" y="448" fill="#FF8C66" font-family="Arial" font-size="10" text-anchor="middle">🥈 #2</text>
  </g>
  
  <!-- LOIC Bar (3 methods) -->
  <g>
    <rect x="440" y="382" width="100" height="18" fill="url(#bar3)" rx="4"/>
    <polygon points="440,382 540,382 530,372 430,372" fill="#777"/>
    <polygon points="540,382 540,400 530,390 530,372" fill="#333"/>
    <text x="490" y="370" fill="#999" font-family="Arial Black" font-size="16" font-weight="bold" text-anchor="middle">3</text>
    <text x="490" y="430" fill="#888" font-family="Arial" font-size="13" text-anchor="middle">LOIC</text>
    <text x="490" y="448" fill="#666" font-family="Arial" font-size="10" text-anchor="middle">💀 Dead 2010</text>
  </g>
  
  <!-- HOIC Bar (3 methods) -->
  <g>
    <rect x="590" y="382" width="100" height="18" fill="url(#bar4)" rx="4"/>
    <polygon points="590,382 690,382 680,372 580,372" fill="#666"/>
    <polygon points="690,382 690,400 680,390 680,372" fill="#2a2a2a"/>
    <text x="640" y="370" fill="#888" font-family="Arial Black" font-size="16" font-weight="bold" text-anchor="middle">3</text>
    <text x="640" y="430" fill="#888" font-family="Arial" font-size="13" text-anchor="middle">HOIC</text>
    <text x="640" y="448" fill="#666" font-family="Arial" font-size="10" text-anchor="middle">💀 Dead 2012</text>
  </g>
  
  <!-- Xerxes Bar (1 method) -->
  <g>
    <rect x="740" y="394" width="100" height="6" fill="url(#bar5)" rx="4"/>
    <polygon points="740,394 840,394 830,384 730,384" fill="#999"/>
    <polygon points="840,394 840,400 830,390 830,384" fill="#555"/>
    <text x="790" y="378" fill="#999" font-family="Arial Black" font-size="16" font-weight="bold" text-anchor="middle">1</text>
    <text x="790" y="430" fill="#888" font-family="Arial" font-size="13" text-anchor="middle">Xerxes</text>
    <text x="790" y="448" fill="#666" font-family="Arial" font-size="10" text-anchor="middle">💀 Dead 2017</text>
  </g>
  
  <!-- Title -->
  <text x="450" y="30" fill="#FF0000" font-family="Arial Black" font-size="22" font-weight="bold" text-anchor="middle" filter="url(#glow)">
    🏆 DDoS TOOL COMPARISON - Total Methods
  </text>
  
  <!-- Legend -->
  <g transform="translate(0, 470)">
    <rect x="100" y="0" width="15" height="15" fill="url(#bar1)" rx="2"/>
    <text x="120" y="12" fill="#FF0000" font-family="Arial" font-size="11">WEB-KILLER (57)</text>
    <rect x="280" y="0" width="15" height="15" fill="url(#bar2)" rx="2"/>
    <text x="300" y="12" fill="#FF4500" font-family="Arial" font-size="11">MHDDoS (26)</text>
    <rect x="440" y="0" width="15" height="15" fill="url(#bar3)" rx="2"/>
    <text x="460" y="12" fill="#888" font-family="Arial" font-size="11">LOIC (3)</text>
    <rect x="580" y="0" width="15" height="15" fill="url(#bar4)" rx="2"/>
    <text x="600" y="12" fill="#888" font-family="Arial" font-size="11">HOIC (3)</text>
    <rect x="720" y="0" width="15" height="15" fill="url(#bar5)" rx="2"/>
    <text x="740" y="12" fill="#888" font-family="Arial" font-size="11">Xerxes (1)</text>
  </g>
</svg>